version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: billing_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: billing
      POSTGRES_PASSWORD: billing_dev_pass
      POSTGRES_DB: billing_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: billing_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
